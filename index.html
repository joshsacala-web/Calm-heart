<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calm Your Heart</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: radial-gradient(circle, #0f172a, #020617);
  color: white;
}

.container {
  margin-top: 60px;
}

#heart {
  width: 120px;
  margin: 40px auto;
  transition: transform 4s ease-in-out, filter 4s ease-in-out;
}

svg {
  width: 100%;
}

#heart path {
  fill: #ff4d6d;
  transition: filter 4s ease-in-out;
}

.glow {
  filter: drop-shadow(0 0 25px #ff4d6d);
}

button {
  padding: 12px 24px;
  font-size: 18px;
  background: #ff4d6d;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

#text {
  font-size: 20px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Calm Your Heart</h2>

  <div id="heart">
    <svg viewBox="0 0 100 100">
      <path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"/>
    </svg>
  </div>

  <p id="text">Press Start</p>
  <button onclick="startBreathing()">Start</button>
</div>

<audio id="sound" loop>
  <source src="https://www.soundjay.com/human/sounds/deep-breath-1.mp3">
</audio>

<script>
let heart = document.getElementById("heart");
let text = document.getElementById("text");
let sound = document.getElementById("sound");

function startBreathing() {
  sound.play();

  function inhale() {
    text.innerText = "Breathe in...";
    heart.style.transform = "scale(1.3)";
    heart.classList.add("glow");
    setTimeout(exhale, 4000);
  }

  function exhale() {
    text.innerText = "Breathe out...";
    heart.style.transform = "scale(1)";
    heart.classList.remove("glow");
    setTimeout(inhale, 6000);
  }

  inhale();
}
</script>

</body>
</html>
