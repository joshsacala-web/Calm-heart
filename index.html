<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calm Your Heart</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

.container {
  margin-top: 60px;
}

#heart {
  position: relative;
  width: 140px;
  margin: 40px auto;
  transform: scale(1);
  transition: transform 4s ease-in-out;
}

svg {
  width: 100%;
}

#fill {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 0%;
  background: #ff4d6d;
  opacity: 0.6;
  transition: height 4s ease-in-out;
}

button {
  padding: 12px 24px;
  font-size: 18px;
  background: #ff4d6d;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

#text {
  font-size: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Calm Your Heart</h2>

  <div id="heart">
    <div id="fill"></div>
    <svg viewBox="0 0 100 100">
      <path fill="none" stroke="#ff4d6d" stroke-width="3"
        d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"/>
    </svg>
  </div>

  <p id="text">Press Start</p>
  <button id="startBtn">Start</button>
</div>

<audio id="sound" preload="auto">
  <source src="https://www.soundjay.com/human/sounds/deep-breath-1.mp3" type="audio/mpeg">
</audio>

<script>
const heart = document.getElementById("heart");
const fill = document.getElementById("fill");
const text = document.getElementById("text");
const sound = document.getElementById("sound");
const btn = document.getElementById("startBtn");

btn.addEventListener("click", () => {
  console.log("Button clicked");

  // try to play sound
  sound.currentTime = 0;
  sound.play().catch(err => {
    console.log("Audio blocked:", err);
  });
