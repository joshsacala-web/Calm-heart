<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calm Your Heart</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
    }

    .container {
      margin-top: 60px;
    }

    #heart {
      font-size: 80px;
      margin: 20px;
      transition: transform 3s ease;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #00ff88;
      color: black;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Calm Your Heart</h2>

  <div id="heart">❤️</div>
  <p id="text">Press Start</p>

  <button onclick="startBreathing()">Start</button>
</div>

<script>
function startBreathing() {
  let text = document.getElementById("text");
  let heart = document.getElementById("heart");

  let count = 0;

  function breathe() {
    if (count >= 5) {
      text.innerText = "You are calm";
      return;
    }

    text.innerText = "Breathe in...";
    heart.style.transform = "scale(1.3)";

    setTimeout(() => {
      text.innerText = "Breathe out...";
      heart.style.transform = "scale(1)";

      count++;
      setTimeout(breathe, 3000);
    }, 3000);
  }

  breathe();
}
</script>

</body>
</html>
